    <title>FlameTV IPTV Player</title>
    
    <!-- PWA Setup -->
    <meta name="theme-color" content="#2b0f4c">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgMjQgMjQiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2Y5NzMxNiIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiPjxwYXRoIGQ9Ik04LjUgMTQuNUEyLjUgMi41IDAgMCAwIDExIDEyYzAtMS4zOC0uNS0yLTEtMy0xLjA3Mi0yLjE0My0uMjI0LTQuMDU0IDItNiAuNSAyLjUgMiA0LjkgNCA2LjUgMiAxLjYgMyAzLjUgMyA1LjVhNyA3IDAgMSAxLTE0IDBjMC0xLjE1My40MzMtMi4yOTQgMS0zYTIuNSAyLjUgMCAwIDAgMi41IDIuNXoiLz48L3N2Zz4=">
    
    <script>
        const pwaManifest = {
            "name": "FlameTV IPTV Player",
            "short_name": "FlameTV",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#2b0f4c",
            "theme_color": "#2b0f4c",
            "icons": [
                {
                    "src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgMjQgMjQiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2Y5NzMxNiIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiPjxwYXRoIGQ9Ik04LjUgMTQuNUEyLjUgMi41IDAgMCAwIDExIDEyYzAtMS4zOC0uNS0yLTEtMy0xLjA3Mi0yLjE0My0uMjI0LTQuMDU0IDItNiAuNSAyLjUgMiA0LjkgNCA2LjUgMiAxLjYgMyAzLjUgMyA1LjVhNyA3IDAgMSAxLTE0IDBjMC0xLjE1My40MzMtMi4yOTQgMS0zYTIuNSAyLjUgMCAwIDAgMi41IDIuNXoiLz48L3N2Zz4=",
                    "sizes": "192x192",
                    "type": "image/svg+xml",
                    "purpose": "any maskable"
                }
            ]
        };
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(pwaManifest));
        document.head.appendChild(manifestLink);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = "self.addEventListener('fetch', () => {});";
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
            });
        }
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ICONS ---
        const Flame = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>);
        const Search = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>);
        const Home = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>);
        const List = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>);
        const Settings = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>);
        const Trash2 = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);
        const Loader2 = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>);
        const AlertCircle = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>);
        const ArrowLeft = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>);
        const Play = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>);
        const Info = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>);
        const HelpCircle = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>);
        const SkipForward = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>);
        const SkipBack = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>);

        // --- SAMPLE DATA & UTILS ---
        const SAMPLE_M3U = `#EXTM3U
#EXTINF:-1 tvg-id="" tvg-name="NASA TV" tvg-logo="https://upload.wikimedia.org/wikipedia/commons/e/e5/NASA_logo.svg" group-title="Science",NASA TV
https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8
#EXTINF:-1 tvg-id="" tvg-name="Red Bull TV" tvg-logo="https://upload.wikimedia.org/wikipedia/en/thumb/f/f5/Red_Bull_TV_logo.svg/1200px-Red_Bull_TV_logo.svg.png" group-title="Sports",Red Bull TV
https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8
#EXTINF:-1 tvg-id="" tvg-name="Al Jazeera English" tvg-logo="https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Al_Jazeera_English_logo.svg/1200px-Al_Jazeera_English_logo.svg.png" group-title="News",Al Jazeera English
https://live-hls-web-aje.getaj.net/AJE/index.m3u8
#EXTINF:-1 tvg-id="" tvg-name="Sky News" tvg-logo="https://upload.wikimedia.org/wikipedia/en/thumb/e/e4/Sky_News_logo.svg/1200px-Sky_News_logo.svg.png" group-title="News",Sky News
https://skynewsau-live.akamaized.net/hls/live/2002689/skynewsau-extra1/master.m3u8`;

        const genId = () => Math.random().toString(36).substring(2, 9) + Date.now().toString(36);

        const parseM3U = (text) => {
          const lines = text.split(/\r?\n/);
          const channels = [];
          let currentChannel = null;

          lines.forEach(line => {
            line = line.trim();
            if (!line) return;
            if (line.startsWith('#EXTINF:')) {
              const logoMatch = line.match(/tvg-logo="([^"]*)"/);
              const groupMatch = line.match(/group-title="([^"]*)"/);
              const nameParts = line.split(',');
              const nameMatch = nameParts[nameParts.length - 1];

              currentChannel = {
                id: genId(),
                name: nameMatch ? nameMatch.trim() : 'Unknown Channel',
                logo: logoMatch ? logoMatch[1] : null,
                group: groupMatch ? groupMatch[1] : 'Uncategorized',
              };
            } else if (!line.startsWith('#') && currentChannel) {
              currentChannel.url = line;
              channels.push(currentChannel);
              currentChannel = null;
            }
          });
          return channels;
        };

        const getInitials = (name) => {
            const words = name.replace(/[^a-zA-Z0-9 ]/g, '').trim().split(' ');
            if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
            if (words.length === 1 && words[0].length >= 2) return words[0].substring(0, 2).toUpperCase();
            if (name.length > 0) return name.substring(0, 2).toUpperCase();
            return 'TV';
        };

        const getGradient = (name) => {
            const gradients = [
                'from-purple-600 to-blue-600', 'from-pink-600 to-rose-600', 'from-emerald-500 to-teal-700',
                'from-orange-500 to-red-600', 'from-indigo-600 to-cyan-600', 'from-yellow-500 to-orange-600'
            ];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return gradients[Math.abs(hash) % gradients.length];
        };

        // --- CLOCK COMPONENT ---
        const Clock = ({ className }) => {
            const [time, setTime] = useState('');
            useEffect(() => {
                const tick = () => setTime(new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                tick();
                const id = setInterval(tick, 1000);
                return () => clearInterval(id);
            }, []);
            return <div className={`font-light text-white/90 drop-shadow-md tracking-wider ${className || ''}`}>{time}</div>;
        };

        // --- VIDEO PLAYER COMPONENT ---
        const PlayerView = ({ channel, onBack, onNext, onPrev, controlsVisible }) => {
          const videoRef = useRef(null);
          const [error, setError] = useState(false);
          const [loading, setLoading] = useState(true);
          const [stats, setStats] = useState({ res: '', fps: '' });

          useEffect(() => {
            let hls;
            // Reset state on channel change
            setLoading(true);
            setError(false);
            setStats({ res: '', fps: '' });

            const initPlayer = () => {
              if (!videoRef.current) return;
              
              if (window.Hls.isSupported()) {
                hls = new window.Hls({ 
                    maxBufferLength: 30, 
                    liveSyncDurationCount: 3,
                    manifestLoadingTimeOut: 20000,
                    manifestLoadingMaxRetry: 3
                });
                
                hls.loadSource(channel.url);
                hls.attachMedia(videoRef.current);
                
                hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
                  setLoading(false);
                  videoRef.current.play().catch(() => console.log("Autoplay prevented"));
                });

                hls.on(window.Hls.Events.LEVEL_SWITCHED, (event, data) => {
                  const level = hls.levels[data.level];
                  if (level) {
                      setStats({ 
                          res: level.height ? level.height + 'p' : '', 
                          fps: level.frameRate ? Math.round(level.frameRate) + ' fps' : '' 
                      });
                  }
                });

                // Standard Error Recovery (Fixes flaky IPTV streams like aurLife)
                hls.on(window.Hls.Events.ERROR, (event, data) => {
                  if (data.fatal) {
                    switch (data.type) {
                      case window.Hls.ErrorTypes.NETWORK_ERROR:
                        console.log('Fatal network error encountered, trying to recover');
                        hls.startLoad();
                        break;
                      case window.Hls.ErrorTypes.MEDIA_ERROR:
                        console.log('Fatal media error encountered, trying to recover');
                        hls.recoverMediaError();
                        break;
                      default:
                        hls.destroy();
                        setError(true);
                        setLoading(false);
                        break;
                    }
                  }
                });
              } else if (videoRef.current.canPlayType('application/vnd.apple.mpegurl')) {
                // Native Safari fallback
                videoRef.current.src = channel.url;
                videoRef.current.addEventListener('loadedmetadata', () => {
                   setLoading(false);
                   videoRef.current.play().catch(() => console.log("Autoplay prevented"));
                });
                videoRef.current.addEventListener('resize', () => {
                   setStats({ res: videoRef.current.videoHeight + 'p', fps: '' });
                });
                videoRef.current.addEventListener('error', () => { setError(true); setLoading(false); });
              }
            };

            if (!window.Hls) {
               const script = document.createElement('script');
               script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1';
               script.onload = initPlayer;
               document.head.appendChild(script);
            } else {
               initPlayer();
            }

            return () => { if (hls) hls.destroy(); };
          }, [channel]);

          // Handle Keyboard playback & track switching
          useEffect(() => {
             const handleKey = (e) => {
                if (e.key === 'Escape' || e.key === 'Backspace') onBack();
                else if (e.key === ' ' || e.key === 'MediaPlayPause') {
                   if (videoRef.current) {
                      if (videoRef.current.paused) videoRef.current.play();
                      else videoRef.current.pause();
                   }
                }
                else if (e.key === 'ArrowRight' || e.key === 'MediaTrackNext') onNext();
                else if (e.key === 'ArrowLeft' || e.key === 'MediaTrackPrevious') onPrev();
             };

             window.addEventListener('keydown', handleKey);
             return () => window.removeEventListener('keydown', handleKey);
          }, [onBack, onNext, onPrev]);

          return (
            <div className="absolute inset-0 bg-black z-[100] flex items-center justify-center">
               {loading && <div className="absolute z-10 text-white flex flex-col items-center"><Loader2 className="animate-spin w-12 h-12 mb-4 text-orange-500" />Tuning in...</div>}
               {error && <div className="absolute z-10 text-white flex flex-col items-center"><AlertCircle className="w-12 h-12 mb-4 text-red-500" />Stream Offline or Invalid URL.</div>}

               {/* autoPlay and playsInline attributes ensure browser compatibility */}
               <video ref={videoRef} className="w-full h-full object-contain" autoPlay playsInline />

               <div className={`absolute inset-0 pointer-events-none transition-opacity duration-500 ${controlsVisible ? 'opacity-100' : 'opacity-0'}`}>
                  <div className="absolute inset-x-0 top-0 bg-gradient-to-b from-black/95 via-black/80 to-transparent pb-24 pt-10 px-12 flex justify-between items-start">
                     <div>
                         <button onClick={onBack} className="pointer-events-auto flex items-center text-white/70 hover:text-white transition-colors mb-4">
                             <ArrowLeft className="w-8 h-8 mr-2" /> <span className="text-xl font-bold">Back</span>
                         </button>
                         <h2 className="text-5xl font-black text-white tracking-tight">{channel.name}</h2>
                         <div className="flex items-center mt-3 space-x-4">
                             <span className="text-orange-500 font-bold text-lg uppercase tracking-widest">{channel.group}</span>
                             <div className="flex items-center space-x-2 text-white/50 bg-white/10 px-3 py-1 rounded-md text-sm font-semibold">
                                 <SkipBack className="w-4 h-4" /> <span>Prev</span>
                             </div>
                             <div className="flex items-center space-x-2 text-white/50 bg-white/10 px-3 py-1 rounded-md text-sm font-semibold">
                                 <span>Next</span> <SkipForward className="w-4 h-4" />
                             </div>
                         </div>
                     </div>

                     {/* Top Right Stats and Clock */}
                     <div className="flex items-center space-x-8 pr-2 pt-2">
                        {stats.res && (
                            <div className="flex items-center space-x-3 text-white/90 bg-white/10 px-5 py-2.5 rounded-xl backdrop-blur-md border border-white/5 shadow-lg">
                                <span className="font-bold tracking-wider text-xl">{stats.res}</span>
                                {stats.fps && <span className="font-light text-white/70">| {stats.fps}</span>}
                            </div>
                        )}
                        <Clock className="text-4xl" />
                     </div>
                  </div>
               </div>
            </div>
          );
        };

        const FuturisticFireLogo = ({ className }) => (
          <div className={`relative flex items-center justify-center ${className}`}>
             <div className="absolute inset-0 bg-orange-600 blur-lg rounded-full animate-pulse opacity-60"></div>
             <Flame className={`relative z-10 text-orange-400 w-full h-full drop-shadow-[0_0_15px_rgba(255,165,0,1)]`} />
             <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-1/2 h-1/2 bg-yellow-300 blur-md rounded-full animate-ping opacity-40"></div>
          </div>
        );

        const AnimatedHomeBanner = () => (
           <div className="relative w-full h-[35vh] overflow-hidden rounded-3xl mb-12 shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex-shrink-0 bg-gradient-to-br from-indigo-900 via-purple-900 to-orange-800">
               <div className="absolute top-0 left-0 w-full h-full overflow-hidden">
                   <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[150%] bg-white/10 blur-[80px] rotate-12 animate-pulse"></div>
                   <div className="absolute bottom-[-20%] right-[-10%] w-[60%] h-[120%] bg-orange-500/20 blur-[100px] -rotate-12 animate-pulse" style={{ animationDelay: '1s' }}></div>
               </div>
               <div className="relative z-10 p-12 flex flex-col justify-center h-full">
                   <div className="flex items-center space-x-4 mb-4">
                       <FuturisticFireLogo className="w-12 h-12" />
                       <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-300 to-yellow-100 drop-shadow-lg tracking-tight">FlameTV</h1>
                   </div>
                   <p className="text-2xl text-white/90 font-light max-w-2xl drop-shadow-md">Your Ultimate Entertainment Hub. Browse live channels, news, and sports instantly in one place.</p>
               </div>
           </div>
        );

        // --- MAIN APP VIEW ---
        function App() {
          // --- Persistent LocalStorage State ---
          const [playlists, setPlaylists] = useState(() => {
              const saved = localStorage.getItem('flametv_playlists');
              if (saved) {
                  try { return JSON.parse(saved); } catch(e) {}
              }
              return [{ id: 'sample', name: 'Global News & Space', channels: parseM3U(SAMPLE_M3U) }];
          });

          useEffect(() => {
              localStorage.setItem('flametv_playlists', JSON.stringify(playlists));
          }, [playlists]);

          // --- Auto Hide Mouse State (Global) ---
          const [mouseHidden, setMouseHidden] = useState(false);
          useEffect(() => {
              let timeout;
              const handleActivity = () => {
                  setMouseHidden(false);
                  clearTimeout(timeout);
                  timeout = setTimeout(() => setMouseHidden(true), 3500);
              };
              // Listen to both mouse and keyboard for interface wake-up
              window.addEventListener('mousemove', handleActivity);
              window.addEventListener('keydown', handleActivity);
              handleActivity(); // Init
              return () => {
                  window.removeEventListener('mousemove', handleActivity);
                  window.removeEventListener('keydown', handleActivity);
                  clearTimeout(timeout);
              };
          }, []);

          // --- App State ---
          const [selectedSidebarId, setSelectedSidebarId] = useState('home');
          const [playingChannel, setPlayingChannel] = useState(null);
          
          const [navState, setNavState] = useState({
             zone: 'sidebar',
             sidebarIndex: 1, // Home is index 1
             contentRow: 0,
             contentCol: 0
          });

          const [newPlName, setNewPlName] = useState('');
          const [newPlContent, setNewPlContent] = useState('');
          const [isImporting, setIsImporting] = useState(false);
          const [importError, setImportError] = useState('');

          const sidebarItems = useMemo(() => {
            return [
              { id: 'search', icon: <Search size={22}/>, label: 'Search' },
              { id: 'home', icon: <Home size={22}/>, label: 'Home' },
              ...playlists.map(p => ({ id: p.id, icon: <List size={22}/>, label: p.name })),
              { id: 'settings', icon: <Settings size={22}/>, label: 'Settings' },
              { id: 'help', icon: <HelpCircle size={22}/>, label: 'Help' },
              { id: 'about', icon: <Info size={22}/>, label: 'About' }
            ];
          }, [playlists]);

          const contentRows = useMemo(() => {
             if (['settings', 'help', 'about'].includes(selectedSidebarId)) return [];

             let allChannels = [];
             if (selectedSidebarId === 'home') {
                allChannels = playlists.flatMap(p => p.channels);
             } else {
                const pl = playlists.find(p => p.id === selectedSidebarId);
                if (pl) allChannels = pl.channels;
             }

             const grouped = allChannels.reduce((acc, ch) => {
                if (!acc[ch.group]) acc[ch.group] = [];
                acc[ch.group].push(ch);
                return acc;
             }, {});

             return Object.entries(grouped).map(([title, channels]) => ({ title, channels }));
          }, [playlists, selectedSidebarId]);

          // Flat list matching exactly what's visible on current page for Prev/Next tracking
          const flatChannels = useMemo(() => {
             return contentRows.flatMap(row => row.channels);
          }, [contentRows]);

          const handleNextChannel = () => {
              if (!playingChannel || flatChannels.length === 0) return;
              const idx = flatChannels.findIndex(c => c.id === playingChannel.id);
              if (idx >= 0 && idx < flatChannels.length - 1) setPlayingChannel(flatChannels[idx + 1]);
              else if (idx === flatChannels.length - 1) setPlayingChannel(flatChannels[0]); // wrap
          };

          const handlePrevChannel = () => {
              if (!playingChannel || flatChannels.length === 0) return;
              const idx = flatChannels.findIndex(c => c.id === playingChannel.id);
              if (idx > 0) setPlayingChannel(flatChannels[idx - 1]);
              else if (idx === 0) setPlayingChannel(flatChannels[flatChannels.length - 1]); // wrap
          };

          // --- Spatial Navigation Logic ---
          useEffect(() => {
            if (playingChannel) return; // Disables main grid navigation while playing video

            const handleNav = (e) => {
              if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                  if (e.key === 'Escape') {
                      e.target.blur();
                      setNavState(p => ({ ...p, zone: 'sidebar' }));
                  }
                  return; 
              }

              if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                  e.preventDefault();
              }

              setNavState(prev => {
                  let { zone, sidebarIndex, contentRow, contentCol } = prev;

                  if (zone === 'sidebar') {
                      switch(e.key) {
                          case 'ArrowUp': sidebarIndex = Math.max(0, sidebarIndex - 1); break;
                          case 'ArrowDown': sidebarIndex = Math.min(sidebarItems.length - 1, sidebarIndex + 1); break;
                          case 'ArrowRight':
                              if (['settings'].includes(selectedSidebarId)) {
                                  zone = 'settings';
                                  setTimeout(() => document.getElementById('pl-name')?.focus(), 50);
                              } else if (contentRows.length > 0) {
                                  zone = 'content';
                                  contentRow = Math.min(contentRow, contentRows.length - 1);
                                  contentCol = Math.min(contentCol, contentRows[contentRow].channels.length - 1);
                              }
                              break;
                          case 'Enter':
                              const targetId = sidebarItems[sidebarIndex].id;
                              setSelectedSidebarId(targetId);
                              if (!['settings', 'help', 'about', 'search'].includes(targetId)) {
                                  zone = 'content';
                                  contentRow = 0;
                                  contentCol = 0;
                              } else if (targetId === 'settings') {
                                  zone = 'settings';
                                  setTimeout(() => document.getElementById('pl-name')?.focus(), 50);
                              }
                              break;
                      }
                  } else if (zone === 'content') {
                      if (contentRows.length === 0) return prev;
                      switch(e.key) {
                          case 'ArrowUp':
                              if (contentRow > 0) {
                                  contentRow--;
                                  contentCol = Math.min(contentCol, contentRows[contentRow].channels.length - 1);
                              }
                              break;
                          case 'ArrowDown':
                              if (contentRow < contentRows.length - 1) {
                                  contentRow++;
                                  contentCol = Math.min(contentCol, contentRows[contentRow].channels.length - 1);
                              }
                              break;
                          case 'ArrowLeft':
                              if (contentCol > 0) contentCol--;
                              else zone = 'sidebar';
                              break;
                          case 'ArrowRight':
                              if (contentCol < contentRows[contentRow].channels.length - 1) contentCol++;
                              break;
                          case 'Enter':
                              setPlayingChannel(contentRows[contentRow].channels[contentCol]);
                              break;
                          case 'Escape':
                          case 'Backspace':
                              zone = 'sidebar';
                              break;
                      }
                  } else if (zone === 'settings') {
                     if (e.key === 'Escape' || e.key === 'ArrowLeft') {
                         zone = 'sidebar';
                     }
                  }
                  return { zone, sidebarIndex, contentRow, contentCol };
              });
            };

            window.addEventListener('keydown', handleNav);
            return () => window.removeEventListener('keydown', handleNav);
          }, [playingChannel, contentRows, sidebarItems, selectedSidebarId]);

          // Scroll adjustments
          useEffect(() => {
            if (navState.zone === 'content') {
               const el = document.getElementById(`channel-${navState.contentRow}-${navState.contentCol}`);
               if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            } else if (navState.zone === 'sidebar') {
               const el = document.getElementById(`sidebar-${navState.sidebarIndex}`);
               if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
          }, [navState]);

          useEffect(() => {
             setNavState(p => ({ ...p, contentRow: 0, contentCol: 0 }));
          }, [selectedSidebarId]);


          const handleImport = async () => {
              if (!newPlName || !newPlContent) return;
              setIsImporting(true);
              setImportError('');
              
              let m3uText = newPlContent;
              if (newPlContent.trim().startsWith('http://') || newPlContent.trim().startsWith('https://')) {
                  try {
                      const response = await fetch(newPlContent.trim());
                      if (!response.ok) throw new Error('Failed to fetch playlist');
                      m3uText = await response.text();
                  } catch (err) {
                      setImportError('Could not load URL. It might be blocked by CORS or invalid.');
                      setIsImporting(false);
                      return;
                  }
              }

              const parsedChannels = parseM3U(m3uText);
              if (parsedChannels.length === 0) {
                  setImportError('No channels found. Ensure it is a valid M3U file.');
                  setIsImporting(false);
                  return;
              }

              setPlaylists(prev => [...prev, { id: genId(), name: newPlName, channels: parsedChannels }]);
              setNewPlName(''); setNewPlContent('');
              setIsImporting(false);
              setNavState(p => ({ ...p, zone: 'sidebar' }));
          };


          // App Level Wrapper for persistent Twilight background & Mouse Hide State
          return (
            <div className={`relative flex h-screen w-screen overflow-hidden select-none transition-colors duration-1000 ${mouseHidden ? 'cursor-none' : ''}`}
                 style={{ background: playingChannel ? '#000' : 'linear-gradient(135deg, #180933 0%, #3e0b4a 40%, #7d1c53 75%, #cf4c3b 100%)' }}>
              
              <style>{`
                .scrollbar-hide::-webkit-scrollbar { display: none; }
                .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
              `}</style>

              {playingChannel ? (
                  <PlayerView 
                      channel={playingChannel} 
                      onBack={() => setPlayingChannel(null)} 
                      onNext={handleNextChannel}
                      onPrev={handlePrevChannel}
                      controlsVisible={!mouseHidden}
                  />
              ) : (
                <>
                  <Clock className="absolute top-8 right-12 text-3xl z-50" />

                  {/* --- ROKU STYLE SIDEBAR --- */}
                  <div className="w-[340px] flex-shrink-0 h-full flex flex-col z-50 bg-black/40 backdrop-blur-md shadow-2xl border-r border-white/5 pt-12">
                    <div className="px-10 flex items-center mb-12">
                       <FuturisticFireLogo className="w-10 h-10 flex-shrink-0" />
                       <span className="ml-4 font-black text-3xl tracking-tight text-white drop-shadow-md">
                          FlameTV
                       </span>
                    </div>

                    <div className="flex flex-col flex-1 overflow-y-auto scrollbar-hide space-y-2 px-6 pb-10">
                       {sidebarItems.map((item, idx) => {
                           const isFocused = navState.zone === 'sidebar' && navState.sidebarIndex === idx;
                           const isSelected = selectedSidebarId === item.id;
                           
                           // Roku specific styling logic
                           let styling = 'text-white/70 hover:text-white';
                           if (isFocused) styling = 'bg-gray-100 text-black font-bold scale-[1.03] shadow-lg';
                           else if (isSelected) styling = 'text-white font-bold bg-white/10';

                           return (
                              <div
                                 key={item.id}
                                 id={`sidebar-${idx}`}
                                 onClick={() => {
                                     setSelectedSidebarId(item.id);
                                     if (['settings'].includes(item.id)) {
                                         setNavState(p => ({ ...p, zone: 'settings', sidebarIndex: idx }));
                                         setTimeout(() => document.getElementById('pl-name')?.focus(), 50);
                                     } else if (!['search', 'help', 'about'].includes(item.id)) {
                                         setNavState(p => ({ ...p, zone: 'content', sidebarIndex: idx }));
                                     } else {
                                         setNavState(p => ({ ...p, zone: 'sidebar', sidebarIndex: idx }));
                                     }
                                 }}
                                 className={`flex items-center px-5 py-4 rounded-lg cursor-pointer transition-all duration-200 ${styling}`}
                              >
                                 {/* Hide icon if it's a playlist item to mimic Roku clean text list, otherwise show */}
                                 {['search', 'home', 'settings', 'help', 'about'].includes(item.id) && (
                                    <div className="w-6 h-6 flex items-center justify-center flex-shrink-0 mr-4">{item.icon}</div>
                                 )}
                                 <span className="text-xl tracking-wide whitespace-nowrap">{item.label}</span>
                              </div>
                           )
                       })}
                    </div>
                  </div>

                  {/* --- MAIN CONTENT AREA --- */}
                  <div className="flex-1 h-screen flex flex-col relative overflow-hidden transition-all duration-300 pl-10 pr-16 pt-24 pb-12">
                     
                     {/* Settings View */}
                     {selectedSidebarId === 'settings' && (
                         <div className="w-full h-full overflow-y-auto scrollbar-hide pr-8">
                             <h2 className="text-5xl font-light mb-10 text-white drop-shadow-md">Settings</h2>
                             <div className="bg-black/30 backdrop-blur-xl p-10 rounded-2xl border border-white/10 max-w-4xl shadow-2xl">
                                <h3 className="text-2xl font-bold mb-6 text-white">Add New Playlist</h3>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-300 uppercase tracking-wider mb-2">Playlist Name</label>
                                        <input id="pl-name" type="text" className="w-full bg-black/50 border border-white/20 rounded-xl p-4 text-white font-semibold focus:ring-4 focus:ring-orange-500 outline-none transition-all" placeholder="e.g., My Sports Streams" value={newPlName} onChange={e => setNewPlName(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-gray-300 uppercase tracking-wider mb-2">Paste raw M3U / M3U8 Content OR a URL</label>
                                        <textarea className="w-full h-48 bg-black/50 border border-white/20 rounded-xl p-4 text-white font-mono text-sm focus:ring-4 focus:ring-orange-500 outline-none transition-all resize-none" placeholder="https://example.com/playlist.m3u&#10;OR&#10;#EXTM3U&#10;#EXTINF:-1 tvg-name=..." value={newPlContent} onChange={e => setNewPlContent(e.target.value)} />
                                    </div>
                                    {importError && <p className="text-red-400 font-bold bg-red-900/40 p-4 rounded-xl border border-red-500/30">{importError}</p>}
                                    <button 
                                       className="bg-gray-100 hover:bg-white text-black font-bold text-lg py-4 px-10 rounded-xl focus:ring-4 focus:ring-orange-500 outline-none transition-all shadow-xl flex items-center justify-center disabled:opacity-50" 
                                       onClick={handleImport} 
                                       disabled={isImporting}
                                    >
                                        {isImporting && <Loader2 className="animate-spin w-6 h-6 mr-3" />}
                                        {isImporting ? 'Importing...' : 'Save list'}
                                    </button>
                                </div>
                             </div>

                             <div className="mt-12 max-w-4xl">
                                 <h3 className="text-2xl font-bold mb-6 text-white drop-shadow-md">Active Playlists</h3>
                                 {playlists.map(pl => (
                                    <div key={pl.id} className="flex items-center justify-between bg-black/30 backdrop-blur-md border border-white/10 p-6 rounded-2xl mb-4 shadow-lg">
                                       <div>
                                           <h4 className="font-bold text-2xl text-white">{pl.name}</h4>
                                           <p className="text-white/60 font-semibold">{pl.channels.length} channels loaded</p>
                                       </div>
                                       <button className="text-white/40 hover:text-red-400 p-4 bg-black/50 rounded-xl focus:ring-4 focus:ring-orange-500 outline-none transition-all" onClick={() => setPlaylists(p => p.filter(x => x.id !== pl.id))}>
                                          <Trash2 size={24} />
                                       </button>
                                    </div>
                                 ))}
                             </div>
                         </div>
                     )}

                     {/* Help View */}
                     {selectedSidebarId === 'help' && (
                         <div className="w-full h-full overflow-y-auto scrollbar-hide pr-8 flex flex-col items-start">
                             <h2 className="text-5xl font-light mb-10 text-white drop-shadow-md">Help & Controls</h2>
                             <div className="bg-black/30 backdrop-blur-xl p-10 rounded-2xl border border-white/10 max-w-3xl shadow-2xl w-full">
                                <h3 className="text-2xl font-bold mb-8 text-orange-400">Keyboard Shortcuts</h3>
                                <div className="space-y-6">
                                    <div className="flex items-center"><span className="bg-white text-black font-bold px-4 py-2 rounded-lg shadow-md mr-6 min-w-[100px] text-center">Arrows</span> <span className="text-xl text-white/90">Navigate interfaces and menus</span></div>
                                    <div className="flex items-center"><span className="bg-white text-black font-bold px-4 py-2 rounded-lg shadow-md mr-6 min-w-[100px] text-center">Enter</span> <span className="text-xl text-white/90">Select item / Open Channel</span></div>
                                    <div className="flex items-center"><span className="bg-white text-black font-bold px-4 py-2 rounded-lg shadow-md mr-6 min-w-[100px] text-center">Esc / Back</span> <span className="text-xl text-white/90">Go back / Close video player</span></div>
                                    <div className="flex items-center"><span className="bg-white text-black font-bold px-4 py-2 rounded-lg shadow-md mr-6 min-w-[100px] text-center">Spacebar</span> <span className="text-xl text-white/90">Play / Pause video stream</span></div>
                                </div>
                             </div>
                         </div>
                     )}

                     {/* About View */}
                     {selectedSidebarId === 'about' && (
                         <div className="w-full h-full flex flex-col items-center justify-center text-center">
                             <FuturisticFireLogo className="w-48 h-48 mb-8" />
                             <h2 className="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-300 to-yellow-100 tracking-tight drop-shadow-2xl mb-4">FlameTV</h2>
                             <p className="text-2xl text-white/80 font-light mb-8 max-w-xl">A futuristic, web-based, zero-dependency IPTV player designed for the 10-foot TV experience.</p>
                             
                             <div className="bg-black/40 backdrop-blur-md px-10 py-6 rounded-2xl border border-white/10 shadow-2xl">
                                 <p className="text-lg text-white/70 mb-2">Created by</p>
                                 <p className="text-3xl font-bold text-white tracking-wide">Tekken (Hammad Ahmed)</p>
                             </div>
                             <p className="text-white/40 mt-12">&copy; 2026 All Rights Reserved.</p>
                         </div>
                     )}

                     {/* Grid / Dashboard View */}
                     {!['settings', 'help', 'about'].includes(selectedSidebarId) && (
                        <div className="flex-1 overflow-y-auto overflow-x-hidden scrollbar-hide z-20 pr-8">
                           
                           {/* Animated Home Banner for 'Home' tab */}
                           {selectedSidebarId === 'home' && <AnimatedHomeBanner />}

                           {contentRows.length === 0 ? (
                               <div className="flex flex-col items-center justify-center mt-32 text-white/50">
                                   <Flame className="w-32 h-32 mb-6 opacity-40" />
                                   <h2 className="text-4xl font-light mb-4 text-white">Playlist is Empty</h2>
                                   <p className="text-xl font-semibold">Navigate to Settings to load your M3U streams.</p>
                               </div>
                           ) : (
                               contentRows.map((row, rIdx) => (
                                  <div key={rIdx} className="mb-12">
                                     <h3 className="text-2xl font-bold text-white mb-6 drop-shadow-md tracking-wide">{row.title}</h3>
                                     <div className="flex space-x-6 overflow-x-hidden pb-8 pt-2">
                                        {row.channels.map((ch, cIdx) => {
                                            const isFocused = navState.zone === 'content' && navState.contentRow === rIdx && navState.contentCol === cIdx;
                                            return (
                                               <div
                                                  key={ch.id}
                                                  id={`channel-${rIdx}-${cIdx}`}
                                                  onClick={() => {
                                                     setNavState(p => ({ ...p, zone: 'content', contentRow: rIdx, contentCol: cIdx }));
                                                     setPlayingChannel(ch);
                                                  }}
                                                  className={`relative flex-shrink-0 w-80 h-48 rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 shadow-xl ${
                                                     isFocused ? 'ring-[5px] ring-white scale-110 z-10 shadow-[0_15px_40px_rgba(0,0,0,0.6)]' : 'opacity-80 hover:opacity-100 hover:scale-105 border border-white/10'
                                                  }`}
                                               >
                                                  {/* Beautiful Initials Background or Image Cover */}
                                                  {ch.logo ? (
                                                     <div className="relative w-full h-full overflow-hidden bg-black flex items-center justify-center">
                                                         {/* Blurred Backdrop for images that aren't perfectly 16:9 */}
                                                         <img src={ch.logo} className="absolute inset-0 w-full h-full object-cover blur-[20px] opacity-60 scale-125" alt=""/>
                                                         <img src={ch.logo} alt={ch.name} className="relative z-10 w-full h-full object-contain p-2 drop-shadow-2xl" />
                                                     </div>
                                                  ) : (
                                                     <div className={`w-full h-full bg-gradient-to-br ${getGradient(ch.name)} flex items-center justify-center relative overflow-hidden`}>
                                                         <span className="text-8xl font-black text-white mix-blend-overlay opacity-30 select-none scale-125">{getInitials(ch.name)}</span>
                                                     </div>
                                                  )}
                                                  
                                                  {/* Constant Sleek Overlay for Title */}
                                                  <div className="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent p-5 pt-16 z-20">
                                                     <p className="text-white font-bold truncate text-lg drop-shadow-md">{ch.name}</p>
                                                  </div>

                                                  {/* Play Icon overlay when focused */}
                                                  {isFocused && (
                                                     <div className="absolute inset-0 flex items-center justify-center bg-black/20 z-30 opacity-0 hover:opacity-100 transition-opacity">
                                                        <div className="bg-white rounded-full p-4 shadow-2xl">
                                                           <Play className="w-8 h-8 text-black fill-current ml-1" />
                                                        </div>
                                                     </div>
                                                  )}
                                               </div>
                                            )
                                        })}
                                     </div>
                                  </div>
                               ))
                           )}
                        </div>
                     )}
                  </div>
                </>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
